name: telegram
requires:
  - "@builtin/agent-manager-acp"

options:
  bot_token:
    type: string
    required: true
    description: "Telegram bot token (baked into gateway middleware at generate-time)"
  allowed_users:
    type: array
    required: false
    description: "Telegram usernames allowed to interact"
    items:
      type: string

contributes:
  gateway:
    services:
      - url: https://api.telegram.org
        middlewares:
          - custom: "./middlewares/telegram-token-rewrite.go"
  sidecar:
    services:
      telegram:
        build: ./telegram-adapter
        environment:
          AGENT_MANAGER_URL: "ws://agent:3100/acp"
          TELEGRAM_BOT_TOKEN: "{{ .options.bot_token }}"
