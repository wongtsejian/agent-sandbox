# Telegram bot agent — agent-manager-acp proxies ACP, telegram connects as sidecar.
name: telegram-agent
log_level: debug

runtime:
  image: "@builtin/codex"
  extra_builds:
    - "RUN npm install -g @agentclientprotocol/codex-acp"
  entrypoint: ["node", "/opt/agent-manager/dist/index.js"]

gateway:
  services:
    - url: https://agent-gateway.stx-ai.net
      headers:
        Authorization: Bearer ${STX_LLM_GATEWAY_API_KEY}

installations:
  - plugin: "@builtin/agent-manager-acp"
    options:
      acp_command: ["codex-acp"]

  - plugin: ./plugins/telegram
    options:
      bot_token: "${TELEGRAM_BOT_TOKEN}"
      allowed_users:
        - "@${TELEGRAM_USERNAME}"
