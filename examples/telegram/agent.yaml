# Telegram bot agent — channel-manager runs as entrypoint, spawns codex via ACP.
name: telegram-agent
log_level: debug

runtime:
  image: "@builtin/codex"
  extra_builds:
    # Build the channel-manager (telegram bridge) into the agent image
    - "COPY channel-manager/ /opt/channel-manager-src/"
    - "RUN --mount=type=cache,target=/root/.npm cd /opt/channel-manager-src && npm install && npm run build && mkdir -p /opt/channel-manager && mv dist /opt/channel-manager/dist && mv node_modules /opt/channel-manager/node_modules && rm -rf /opt/channel-manager-src"
    - "COPY channel-manager-config.json /opt/channel-manager/config.json"
  entrypoint: ["node", "/opt/channel-manager/dist/index.js"]

gateway:
  services:
    - url: https://agent-gateway.stx-ai.net
      headers:
        Authorization: Bearer ${STX_LLM_GATEWAY_API_KEY}

installations:
  - plugin: telegram
    options:
      bot_token: "${TELEGRAM_BOT_TOKEN}"
      allowed_users:
        - "@${TELEGRAM_USERNAME}"
