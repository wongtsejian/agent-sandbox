# yaml-language-server: $schema=.build/schema.json
name: coder
core_version: latest
log_level: debug
runtime:
  image: "@builtin/claude-code"
  entrypoint: ["sleep", "infinity"]
  environment:
    ANTHROPIC_API_KEY: "gateway-managed"
    ANTHROPIC_BASE_URL: "https://agent-gateway.stx-ai.net/kiro"
gateway:
  services:
    - url: https://agent-gateway.stx-ai.net
      headers:
        Authorization: Bearer ${STX_LLM_GATEWAY_API_KEY}
installations:
  - plugin: "@builtin/home-override"
    options:
      home_directory: "./home"
      volume: true
  - plugin: "@builtin/mcp-oauth"
    options:
      providers:
        notion:
          mcp_url: https://mcp.notion.com/mcp
