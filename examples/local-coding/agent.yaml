# yaml-language-server: $schema=.build/schema.json
name: coder
runtime: codex
log_level: debug
features:
  - plugin: static-header
    name: stx-llm-gateway
    domains: ["http://host.containers.internal:8000"]
    header: "Authorization"
    value_format: "Bearer ${value}"
    secret: "${STX_LLM_GATEWAY_API_KEY}"

  - plugin: ssh
    port: 2222
    authorized_keys: "./ssh_key.pub"

  - plugin: custom-runtime
    home_override: "./home"
    runtime_volumes:
      - "agent-home:/home/agent"
