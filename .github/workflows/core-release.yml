name: Core Release

on:
  push:
    tags:
      - "core-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest

    runs-on: ${{ matrix.runner }}
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#core-}" >> "$GITHUB_OUTPUT"

      - name: Build host binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags "-X main.version=${{ steps.version.outputs.version }}" \
            -o agent-sandbox-core ./cmd/agent-sandbox-core/

      - name: Build gateway binaries
        run: |
          mkdir -p gateway-bin
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o gateway-bin/gateway-linux-amd64 ./core/gateway/cmd/gateway/
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o gateway-bin/gateway-linux-arm64 ./core/gateway/cmd/gateway/

      - name: Smoke test gateway
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          # Create minimal config
          mkdir -p /tmp/smoke-test/plugins/github-pat/src
          cp core/plugins/github-pat/src/github-auth.ts /tmp/smoke-test/plugins/github-pat/src/

          cat > /tmp/smoke-test/config.yaml << 'EOF'
          listen: ":8443"
          dns_listen: ":15353"
          mitm_domains: []
          EOF

          cat > /tmp/smoke-test/plugins.yaml << 'EOF'
          plugins:
            - name: github-pat
              dir: /tmp/smoke-test/plugins/github-pat
              options:
                token: "test-token"
              gateway:
                middlewares:
                  - script: "./src/github-auth.ts"
                    domains: ["api.github.com"]
          EOF

          # Start gateway in background, wait for health endpoint
          GATEWAY_CONFIG=/tmp/smoke-test/config.yaml \
          GATEWAY_PLUGINS_CONFIG=/tmp/smoke-test/plugins.yaml \
          ./gateway-bin/gateway-linux-amd64 &
          GW_PID=$!

          # Wait up to 5 seconds for health
          for i in $(seq 1 10); do
            if wget -q -O /dev/null http://localhost:8080/health 2>/dev/null; then
              echo "Gateway healthy after ${i}00ms"
              kill $GW_PID
              exit 0
            fi
            sleep 0.5
          done

          echo "ERROR: Gateway did not become healthy"
          kill $GW_PID 2>/dev/null
          exit 1

      - name: Package tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="$(mktemp -d)"

          # Host binary
          cp agent-sandbox-core "$STAGING/"

          # Templates (generation templates used by CLI)
          cp -r internal/generate/templates "$STAGING/templates"
          # Remove Go source/test files — only .tmpl files ship
          find "$STAGING/templates" -name '*.go' -delete

          # Plugins (data-driven YAML plugin definitions + TS source)
          cp -r core/plugins "$STAGING/plugins"

          # Presets (runtime.yaml files for @builtin/* images)
          cp -r core/presets "$STAGING/presets"

          # Gateway pre-built binaries
          mkdir -p "$STAGING/gateway/bin"
          cp gateway-bin/gateway-linux-amd64 "$STAGING/gateway/bin/"
          cp gateway-bin/gateway-linux-arm64 "$STAGING/gateway/bin/"

          # SDK (gateway middleware interfaces — needed for plugin development)
          cp -r core/sdk "$STAGING/sdk"

          # Create tarball
          ASSET="core-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar -czf "$ASSET" -C "$STAGING" .

          echo "asset=$ASSET" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.asset }}

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: core-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Core ${{ needs.build.outputs.version }}"
          body: |
            Core release `${{ needs.build.outputs.version }}` for agent-sandbox.

            Contains platform-specific host binary (`agent-sandbox-core`), pre-built gateway binaries (linux/amd64 + linux/arm64), templates, plugins (with TS source), presets, and SDK.

            ### Artifacts
            - `core-${{ needs.build.outputs.version }}-darwin-arm64.tar.gz` — macOS Apple Silicon
            - `core-${{ needs.build.outputs.version }}-darwin-amd64.tar.gz` — macOS Intel
            - `core-${{ needs.build.outputs.version }}-linux-amd64.tar.gz` — Linux x86_64
            - `core-${{ needs.build.outputs.version }}-linux-arm64.tar.gz` — Linux ARM64

            Used by CLI when `core_version: ${{ needs.build.outputs.version }}` is set in agent.yaml.
          files: artifacts/*
