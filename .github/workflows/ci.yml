name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR — only latest matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which paths changed so downstream jobs can skip when irrelevant.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      artifacts: ${{ steps.filter.outputs.artifacts }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - 'go.work.sum'
              - '.golangci.yml'
            artifacts:
              - 'internal/generate/**'
              - 'internal/plugins/**'
              - 'internal/config/**'
              - 'internal/resolve/**'
              - 'cmd/**'
              - 'gateway/**'
              - 'examples/**'
              - 'tests/integration/**'
              - 'embed.go'

  lint:
    name: Go (lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.artifacts == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: golangci/golangci-lint-action@v9

  go:
    name: Go (test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    # Run when Go files change OR when artifacts need the CLI binary
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.artifacts == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Test
        run: go test -race ./...

      - name: Build CLI
        run: go build -o agent-sandbox ./cmd/agent-sandbox/

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-sandbox-linux
          path: agent-sandbox
          retention-days: 1

  examples:
    name: Examples (generate + compose up)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes, go]
    if: needs.changes.outputs.artifacts == 'true'
    strategy:
      fail-fast: false
      matrix:
        example: [telegram, local-coding, multi-agent]
    steps:
      - uses: actions/checkout@v6

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: agent-sandbox-linux

      - name: Make CLI executable
        run: chmod +x ./agent-sandbox

      - name: Generate build artifacts
        run: ./agent-sandbox generate -C examples/${{ matrix.example }}

      - name: Start containers (smoke test)
        env:
          STX_LLM_GATEWAY_API_KEY: test-stub
          TELEGRAM_BOT_TOKEN: test-stub
        run: |
          ./agent-sandbox -C examples/${{ matrix.example }} compose up -d --build --wait --wait-timeout 60

      - name: Teardown
        if: always()
        run: ./agent-sandbox -C examples/${{ matrix.example }} compose down -v

  sandbox:
    name: Sandbox (integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes, go]
    if: needs.changes.outputs.artifacts == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: agent-sandbox-linux

      - name: Make CLI executable
        run: chmod +x ./agent-sandbox

      - name: Run sandbox integration tests
        env:
          CLI_PATH: ${{ github.workspace }}/agent-sandbox
        run: tests/integration/sandbox/run.sh
