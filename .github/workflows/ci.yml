name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR — only latest matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which paths changed so downstream jobs can skip when irrelevant.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      artifacts: ${{ steps.filter.outputs.artifacts }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - 'go.work.sum'
              - '.golangci.yml'
            artifacts:
              - 'internal/generate/**'
              - 'internal/plugins/**'
              - 'internal/config/**'
              - 'internal/resolve/**'
              - 'cmd/**'
              - 'gateway/**'
              - 'examples/**'
              - 'tests/integration/**'
              - 'embed.go'

  lint:
    name: Go (lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.artifacts == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: golangci/golangci-lint-action@v9

  go:
    name: Go (test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    # Run when Go files change OR when artifacts need the CLI binary
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.artifacts == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Test
        run: go test -race ./...

      - name: Build CLI
        run: go build -o agent-sandbox ./cmd/agent-sandbox/

      - name: Build core binary
        run: go build -o agent-sandbox-core ./cmd/agent-sandbox-core/

      - name: Lint shell scripts
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck scripts/shim.sh scripts/install.sh
          else
            echo "shellcheck not available, skipping"
          fi

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-sandbox-linux
          path: agent-sandbox
          retention-days: 1

      - name: Upload core binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-sandbox-core-linux
          path: agent-sandbox-core
          retention-days: 1

  examples:
    name: Examples (generate + compose up)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes, go]
    if: needs.changes.outputs.artifacts == 'true'
    strategy:
      fail-fast: false
      matrix:
        example: [telegram, local-coding, multi-agent]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build gateway binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o core/gateway/bin/gateway-linux-amd64 ./core/gateway/cmd/gateway/

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: agent-sandbox-linux

      - name: Download core binary
        uses: actions/download-artifact@v4
        with:
          name: agent-sandbox-core-linux

      - name: Make binaries executable
        run: chmod +x ./agent-sandbox ./agent-sandbox-core

      - name: Generate build artifacts
        run: ./agent-sandbox generate --core=./core -C examples/${{ matrix.example }}

      - name: Generate build artifacts (core binary)
        run: ./agent-sandbox-core generate --core=./core -C examples/${{ matrix.example }}

      - name: Start containers (smoke test)
        env:
          STX_LLM_GATEWAY_API_KEY: test-stub
          TELEGRAM_BOT_TOKEN: test-stub
        run: |
          ./agent-sandbox -C examples/${{ matrix.example }} compose up -d --build || true
          # Wait for gateway(s) to be healthy — proves mounts, config, and binary work.
          # Agent and sidecars with stub credentials may crash; that's expected in CI.
          for i in $(seq 1 30); do
            if docker ps --filter "name=gateway" --filter "health=healthy" --format '{{.Names}}' | grep -q gateway; then
              echo "Gateway healthy"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: No healthy gateway after 60s"
          ./agent-sandbox -C examples/${{ matrix.example }} compose ps
          ./agent-sandbox -C examples/${{ matrix.example }} compose logs
          exit 1

      - name: Wait for agent entrypoint
        run: sleep 5

      - name: Audit security contract
        run: ./agent-sandbox -C examples/${{ matrix.example }} audit || true

      - name: Teardown
        if: always()
        run: ./agent-sandbox -C examples/${{ matrix.example }} compose down -v

  sandbox:
    name: Sandbox (integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes, go]
    if: needs.changes.outputs.artifacts == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build gateway binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o core/gateway/bin/gateway-linux-amd64 ./core/gateway/cmd/gateway/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: agent-sandbox-linux

      - name: Make CLI executable
        run: chmod +x ./agent-sandbox

      - name: Run sandbox integration tests
        env:
          CLI_PATH: ${{ github.workspace }}/agent-sandbox
          CORE_PATH: ${{ github.workspace }}/core
        run: tests/integration/sandbox/run.sh
