name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

jobs:
  go:
    name: Go (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        continue-on-error: true
        id: lint

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build ./...

      - name: Fail if lint failed
        if: steps.lint.outcome == 'failure'
        run: exit 1

  typescript:
    name: TypeScript (typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: channel-manager
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: channel-manager/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run
