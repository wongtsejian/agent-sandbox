name: Shim Release

on:
  push:
    branches: [main]
    paths: ['scripts/shim.sh']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract shim version
        id: version
        run: |
          VER=$(grep '^SHIM_VERSION=' scripts/shim.sh | cut -d'"' -f2)
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Create versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "shim-v${{ steps.version.outputs.version }}"
          name: "Shim v${{ steps.version.outputs.version }}"
          body: "Updated agent-sandbox shim script."
          files: scripts/shim.sh

      - name: Update rolling shim-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing shim-latest release and tag if they exist
          gh release delete shim-latest --yes 2>/dev/null || true
          git push origin :refs/tags/shim-latest 2>/dev/null || true

          # Create new shim-latest tag and release
          gh release create shim-latest scripts/shim.sh \
            --title "Shim (latest)" \
            --notes "Rolling release — always points to the latest shim script (v${{ steps.version.outputs.version }})." \
            --prerelease
