name: home-version-control
description: Custom packages, startup hooks, persistent home, and home override directory

config_schema:
  properties:
    commands:
      type: array
      items:
        type: string
      description: Additional RUN commands for the Dockerfile (e.g., apt-get install)
    entrypoint_hooks:
      type: array
      items:
        type: string
      description: Scripts to run on container start (paths relative to agent.yaml)
    runtime_volumes:
      type: array
      items:
        type: string
      description: Named volumes (e.g., "agent-home:/home/agent")
    home_override:
      type: string
      description: Directory to copy into /home/agent on start (default "./home")

contributions:
  image:
    commands_from: config.commands
  entrypoint:
    hooks_from: config.entrypoint_hooks
  compose:
    volumes_from: config.runtime_volumes
