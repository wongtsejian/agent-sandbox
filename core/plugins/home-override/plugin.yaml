name: home-override
options:
  home_directory:
    type: string
    required: true
    description: "Path to local directory with agent home contents (relative to project root)"
  volume:
    type: boolean
    required: false
    default: false
    description: "Persist home directory across restarts using a named Docker volume. Config files are re-synced from home_directory on every start."

contributes:
  runtime:
    extra_builds:
      - "COPY {{ .plugin.options.home_directory }} /opt/home-seed/"
      - "RUN chown -R agent:agent /opt/home-seed"
    pre_entrypoint:
      - 'chmod 755 "$AGENT_HOME" 2>/dev/null || true; if [ ! -f "$AGENT_HOME/.home-seeded" ]; then cp -a /opt/home-seed/. "$AGENT_HOME/" && touch "$AGENT_HOME/.home-seeded"; fi'
    volumes:
      - "{{ if .plugin.options.volume }}{{ .agent.name }}-home:/home/agent{{ end }}"
