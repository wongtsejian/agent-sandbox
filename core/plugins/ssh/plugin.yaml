name: ssh
options:
  port:
    type: integer
    required: false
    default: 2222
    description: "SSH port to expose"
  authorized_keys:
    type: string
    required: true
    description: "Path to public key file (relative to project root)"

contributes:
  runtime:
    cap_add:
      - SYS_CHROOT
    skip_userns: true
    extra_builds:
      - "RUN apt-get update && apt-get install -y --no-install-recommends openssh-server && rm -rf /var/lib/apt/lists/*"
      - "RUN mkdir -p /run/sshd /etc/ssh/authorized_keys"
      - "RUN rm -f /etc/ssh/ssh_host_ed25519_key /etc/ssh/ssh_host_ed25519_key.pub && ssh-keygen -t ed25519 -f /etc/ssh/ssh_host_ed25519_key -N '' -q"
      - "RUN sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config"
      - "RUN sed -i 's/^#*Port.*/Port {{ .plugin.options.port }}/' /etc/ssh/sshd_config"
      - "RUN echo 'AuthorizedKeysFile /etc/ssh/authorized_keys/%u' >> /etc/ssh/sshd_config"
      - "COPY {{ .plugin.options.authorized_keys }} /etc/ssh/authorized_keys/agent"
      - "RUN chmod 755 /etc/ssh/authorized_keys && chmod 644 /etc/ssh/authorized_keys/agent"
    pre_entrypoint:
      - "/usr/sbin/sshd -p {{ .plugin.options.port }}"
    ports:
      - "{{ .plugin.options.port }}:{{ .plugin.options.port }}"
