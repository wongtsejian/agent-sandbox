name: pi
base_image: node:24-slim
install:
  - apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates && rm -rf /var/lib/apt/lists/*
  - --mount=type=cache,target=/root/.npm npm install -g @earendil-works/pi-coding-agent@0.75.5 pi-acp@0.0.27
cmd: ["sleep", "infinity"]
acp_cmd: ["pi-acp"]
