name: claude-code
base_image: node:24-slim
install:
  - apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates && rm -rf /var/lib/apt/lists/*
  - --mount=type=cache,target=/root/.npm npm install -g @anthropic-ai/claude-code@2.1.161 @agentclientprotocol/claude-agent-acp@0.40.0
cmd: ["sleep", "infinity"]
acp_cmd: ["claude-agent-acp"]
